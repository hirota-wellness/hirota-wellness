<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>関節の動き・筋肉学習アプリ</title>
<style>
body { font-family: sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; text-align: center; }
h1 { font-size: 20px; color: #0056b3; }
#quiz-container { background: #fff; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
.question { font-size: 18px; font-weight: bold; margin-bottom: 20px; }
.btn { display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 16px; background-color: #e2e8f0; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; }
.btn:active { background-color: #cbd5e1; }
#result { font-size: 20px; font-weight: bold; margin-top: 20px; display: none; }
</style>
</head>
<body>
<div id="quiz-container">
<h1>関節の動き・筋肉学習アプリ</h1>
<div id="question-text" class="question"></div>
<div id="choices-container"></div>
<div id="result"></div>
</div>

<script>
const quizData = [
{
question: "肩関節の「屈曲」において、貢献度1位の筋肉は？",
choices: ["広背筋", "三角筋(前部)", "大胸筋(上部)", "棘上筋"],
answer: "三角筋(前部)"
},
{
question: "肘関節の「伸展」において、貢献度1位の筋肉は？",
choices: ["上腕二頭筋", "上腕筋", "上腕三頭筋", "肘筋"],
answer: "上腕三頭筋"
},
{
question: "股関節の「屈曲」において、貢献度1位の筋肉は？",
choices: ["大殿筋", "ハムストリングス", "中殿筋", "腸腰筋"],
answer: "腸腰筋"
},
{
question: "膝関節の「屈曲」において、貢献度1位の筋肉は？",
choices: ["ハムストリングス", "大腿四頭筋", "腓腹筋", "大殿筋"],
answer: "ハムストリングス"
},
{
question: "肩関節の「外転」において、貢献度2位の筋肉は？",
choices: ["三角筋(中部)", "棘上筋", "大円筋", "広背筋"],
answer: "棘上筋"
}
];

let currentQuestionIndex = 0;
let score = 0;

const questionText = document.getElementById("question-text");
const choicesContainer = document.getElementById("choices-container");
const resultElement = document.getElementById("result");

function loadQuestion() {
const currentQuiz = quizData[currentQuestionIndex];
questionText.textContent = currentQuiz.question;
choicesContainer.innerHTML = "";

currentQuiz.choices.forEach(choice => {
const button = document.createElement("button");
button.textContent = choice;
button.classList.add("btn");
button.onclick = () => checkAnswer(choice);
choicesContainer.appendChild(button);
});
}

function checkAnswer(selectedChoice) {
const currentQuiz = quizData[currentQuestionIndex];
if (selectedChoice === currentQuiz.answer) {
score++;
alert("正解！");
} else {
alert("不正解... 正解は「" + currentQuiz.answer + "」です。");
}

currentQuestionIndex++;
if (currentQuestionIndex < quizData.length) {
loadQuestion();
} else {
showResult();
}
}

function showResult() {
questionText.style.display = "none";
choicesContainer.style.display = "none";
resultElement.style.display = "block";
resultElement.textContent = "お疲れ様でした！ 5問中 " + score + " 問正解です。";
}

loadQuestion();
</script>

</body>
</html>
